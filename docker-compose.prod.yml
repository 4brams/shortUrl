name: shortUrl

services:
  db:
    image: postgres:15
    container_name: shorturl_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - shorturlpgdata:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    image: shorturl_frontend_deploy
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  backend:
    image: shorturl_backend_deploy
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: shorturl_nginx
    ports:
      - "9000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - db
      - frontend
      - backend

volumes:
  shorturlpgdata:
