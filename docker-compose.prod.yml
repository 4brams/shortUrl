services:
  db:
    image: postgres:15
    container_name: shorturl_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - shorturlpgdata:/var/lib/postgresql/data

  frontend:
    image: shorturl_frontend_deploy
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000"

  backend:
    image: shorturl_backend_deploy
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: shorturl_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  shorturlpgdata:
